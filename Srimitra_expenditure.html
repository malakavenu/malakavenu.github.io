<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Srimitra Lifestyle — Expenditure Dashboard</title>
<style>
/* ═══════ THEME VARIABLES ═══════ */
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22252f; --border:#2a2d3a;
  --text:#e4e4e8; --text2:#9ca3af; --text3:#6b7280;
  --accent:#6366f1; --accent2:#818cf8;
  --green:#34d399; --green-bg:rgba(52,211,153,.12);
  --red:#f87171; --red-bg:rgba(248,113,113,.12);
  --amber:#fbbf24; --amber-bg:rgba(251,191,36,.12);
  --blue:#60a5fa; --blue-bg:rgba(96,165,250,.12);
  --sidebar-w:200px;
}
[data-theme="light"] {
  --bg:#f5f5f7; --surface:#fff; --surface2:#f0f0f3; --border:#e0e0e5;
  --text:#1a1a2e; --text2:#555; --text3:#888;
  --green-bg:rgba(16,185,129,.1); --red-bg:rgba(239,68,68,.1);
  --amber-bg:rgba(245,158,11,.1); --blue-bg:rgba(59,130,246,.1);
}

/* ═══════ RESET & BASE ═══════ */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;display:flex;min-height:100vh;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* ═══════ SIDEBAR ═══════ */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-brand{padding:20px 16px 12px;font-size:14px;font-weight:700;color:var(--accent2);border-bottom:1px solid var(--border);letter-spacing:.3px}
.sidebar-nav{flex:1;padding:8px 0}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:12px;color:var(--text2);text-decoration:none;border-left:3px solid transparent;transition:all .15s}
.nav-link:hover{color:var(--text);background:rgba(99,102,241,.06)}
.nav-link.active{color:var(--accent2);border-left-color:var(--accent);background:rgba(99,102,241,.08);font-weight:600}
.nav-link .icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.sidebar-btn{flex:1;padding:8px 0;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;text-align:center;transition:all .15s}
.sidebar-btn:hover{border-color:var(--accent);color:var(--text)}

/* ═══════ MAIN ═══════ */
.main{margin-left:var(--sidebar-w);flex:1;padding:24px 32px 60px;max-width:1100px}

/* ═══════ HEADER ═══════ */
.header{margin-bottom:8px}
.header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.header-sub{color:var(--text2);font-size:13px}

/* ═══════ QUARTER FILTER ═══════ */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0 24px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;align-items:center}
.filter-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-right:8px;flex-shrink:0}
.filter-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-chip:hover{border-color:var(--accent);color:var(--text)}
.filter-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* ═══════ SECTION ═══════ */
section{margin-bottom:40px;scroll-margin-top:20px}
.sec-title{font-size:17px;font-weight:600;margin-bottom:4px}
.sec-desc{font-size:12px;color:var(--text3);margin-bottom:14px}

/* ═══════ STATS ═══════ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-v{font-size:22px;font-weight:700;color:var(--accent2)}
.stats-4{grid-template-columns:repeat(4,1fr)}
.stats-3{grid-template-columns:repeat(3,1fr)}
.stat-v.up{color:var(--red)} .stat-v.dn{color:var(--green)} .stat-v.n{color:var(--text)}
.stat-l{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-top:4px}

/* ═══════ CHART CONTAINERS ═══════ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.box-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.8px}

/* ═══════ BARS ═══════ */
.spark-row{display:grid;gap:10px;margin:12px 0}
.spark-col{text-align:center}
.spark-area{height:120px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:6px}
.spark-bar{width:36px;border-radius:5px 5px 0 0;position:relative;transition:height .4s}
.spark-bar .sv{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;white-space:nowrap}
.spark-lbl{font-size:11px;font-weight:600}
.spark-sub{font-size:9px;color:var(--text3)}

.bar-chart-wrap{position:relative;margin:12px 0}
.bar-row{display:grid;gap:6px;margin:12px 0}
.bar-col{text-align:center}
.bar-area{height:160px;display:flex;align-items:flex-end;justify-content:center;gap:3px;margin-bottom:6px}
.bar-stick{width:20px;border-radius:3px 3px 0 0;position:relative;transition:height .4s;cursor:pointer}
.bar-stick:hover{opacity:.8}
.bar-stick .bv{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:7px;font-weight:700;white-space:nowrap}
.bar-lbl{font-size:9px;font-weight:600}
.bar-sub{font-size:8px;color:var(--text3)}

.chart-legend{display:flex;gap:16px;justify-content:center;margin-bottom:8px;font-size:11px}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend .ldot{width:10px;height:3px;border-radius:2px}

.hbar-row{display:flex;align-items:center;margin-bottom:7px}
.hbar-label{width:110px;font-size:11px;color:var(--text2);text-align:right;padding-right:10px;flex-shrink:0}
.hbar-track{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden}
.hbar-fill{height:100%;border-radius:5px;transition:width .5s}
.hbar-val{width:70px;font-size:11px;font-weight:600;text-align:right;padding-left:8px;flex-shrink:0;font-variant-numeric:tabular-nums}

/* ═══════ TABLE ═══════ */
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin:8px 0 16px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:var(--surface2);color:var(--text2);padding:9px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--accent2)}
thead th.sorted::after{content:" \u25B2";font-size:8px}
thead th.sorted.desc::after{content:" \u25BC"}
tbody td{padding:8px 10px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:rgba(99,102,241,.06)}
tbody tr:last-child td{border-bottom:none}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tr-total td{font-weight:700;background:rgba(99,102,241,.1)!important;border-top:2px solid var(--accent)}

/* ═══════ PILLS ═══════ */
.pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:9px;font-weight:700}
.pill.up{background:var(--red-bg);color:var(--red)}
.pill.dn{background:var(--green-bg);color:var(--green)}
.pill.fl{background:rgba(107,114,128,.15);color:var(--text3)}
.pill.warn{background:var(--amber-bg);color:var(--amber)}
.cat-dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}

/* ═══════ INSIGHTS ═══════ */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.insight{padding:12px;border-radius:8px;border-left:3px solid}
.insight.g{background:var(--green-bg);border-color:var(--green)}
.insight.r{background:var(--red-bg);border-color:var(--red)}
.insight.a{background:var(--amber-bg);border-color:var(--amber)}
.insight.b{background:var(--blue-bg);border-color:var(--blue)}
.insight-t{font-weight:700;font-size:12px;margin-bottom:3px}
.insight-d{font-size:11px;color:var(--text2);line-height:1.35}

/* ═══════ SEARCH ═══════ */
.search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-input{flex:1;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-count{font-size:11px;color:var(--text3);white-space:nowrap}

/* ═══════ LINE CHART ═══════ */
.line-chart{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.line-chart svg{width:100%;height:auto}
.line-chart text{fill:var(--text2);font-size:10px}
.line-chart .grid-line{stroke:var(--border);stroke-width:1}
.line-chart .data-line{fill:none;stroke:var(--accent2);stroke-width:2.5}
.line-chart .avg-line{stroke:var(--amber);stroke-width:1.5;stroke-dasharray:6 4}
.line-chart .dot{fill:var(--accent2);cursor:pointer}
.line-chart .dot:hover{r:5;fill:var(--accent)}
.chart-tooltip{position:absolute;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;pointer-events:none;z-index:50;display:none;white-space:nowrap}

/* ═══════ ENHANCED STAT CARDS ═══════ */
.stat-accent{border-top:3px solid var(--accent)}
.stat-accent.water{border-color:#3b82f6} .stat-accent.sec{border-color:#8b5cf6}
.stat-accent.elec{border-color:#f59e0b} .stat-accent.burn{border-color:var(--red)}
.stat-mini{font-size:10px;color:var(--text3);margin-top:2px}

/* ═══════ HEATMAP ═══════ */
.heatmap{display:grid;gap:2px;margin:12px 0}
.hm-cell{border-radius:4px;padding:4px 2px;text-align:center;font-size:9px;font-weight:600;transition:transform .15s;cursor:default;min-height:28px;display:flex;align-items:center;justify-content:center}
.hm-cell:hover{transform:scale(1.15);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hm-header{font-size:9px;color:var(--text3);text-align:center;font-weight:600;padding:4px 2px}
.hm-row-label{font-size:10px;color:var(--text2);text-align:right;padding-right:6px;display:flex;align-items:center;justify-content:flex-end}
.hm-legend{display:flex;align-items:center;gap:4px;justify-content:center;margin-top:8px;font-size:9px;color:var(--text3)}
.hm-legend-bar{height:8px;border-radius:4px;width:120px;background:linear-gradient(90deg,var(--surface2),var(--accent))}

/* ═══════ TOP PAYMENT CARDS ═══════ */
.top-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:12px 0}
.top-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 12px;position:relative;overflow:hidden;transition:border-color .15s}
.top-card:hover{border-color:var(--accent)}
.top-rank{position:absolute;top:8px;right:10px;font-size:20px;font-weight:800;color:var(--border);line-height:1}
.top-amt{font-size:18px;font-weight:700;color:var(--accent2);margin-bottom:2px}
.top-vendor{font-size:11px;font-weight:600;margin-bottom:1px}
.top-detail{font-size:9px;color:var(--text3)}

/* ═══════ ONE-TIME vs RECURRING ═══════ */
.split-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;margin:8px 0 16px}
.split-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:width .4s}
.ot-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s}
.ot-card:hover{border-color:var(--accent)}
.ot-left{display:flex;align-items:center;gap:10px}
.ot-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ot-name{font-size:12px;font-weight:600}
.ot-meta{font-size:10px;color:var(--text3)}
.ot-amount{font-size:15px;font-weight:700;text-align:right}

/* ═══════ MONTH BAR CHART ═══════ */
.month-bar-wrap{position:relative}
.month-avg-line{position:absolute;left:0;right:0;border-top:2px dashed var(--amber);z-index:1}
.month-avg-label{position:absolute;right:0;font-size:9px;color:var(--amber);transform:translateY(-14px)}

/* ═══════ DONUT ═══════ */
.donut-wrap{display:flex;align-items:center;gap:20px}
.legend{font-size:11px}
.legend-row{display:flex;align-items:center;gap:6px;padding:2px 0}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.legend-name{flex:1;color:var(--text2)}
.legend-val{font-weight:600;font-variant-numeric:tabular-nums}

/* ═══════ FOOTER ═══════ */
.footer{text-align:center;padding:16px 0;font-size:10px;color:var(--text3);border-top:1px solid var(--border);margin-top:32px}

/* ═══════ MOBILE BOTTOM NAV ═══════ */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:200;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.mobile-nav-inner{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:2px;padding:0 4px}
.mobile-nav-inner::-webkit-scrollbar{display:none}
.mob-link{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 10px;font-size:9px;color:var(--text3);text-decoration:none;border-radius:8px;min-width:56px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.mob-link.active{color:var(--accent2);background:rgba(99,102,241,.1)}
.mob-link .mob-icon{font-size:16px}
.mob-link span:last-child{white-space:nowrap}

/* ═══════ MOBILE TOOLBAR ═══════ */
.mobile-toolbar{display:none;position:fixed;top:0;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);z-index:200;padding:8px 12px;align-items:center;justify-content:space-between}
.mob-title{font-size:14px;font-weight:700;color:var(--accent2)}
.mob-actions{display:flex;gap:6px}
.mob-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* ═══════ RESPONSIVE: TABLET ═══════ */
@media(max-width:900px){
  .sidebar{width:60px} .sidebar-brand,.nav-link span:not(.icon){display:none} .nav-link{justify-content:center;padding:12px 0} .main{margin-left:60px;padding:16px}
  .stats{grid-template-columns:repeat(2,1fr)} .grid2{grid-template-columns:1fr} .insight-grid{grid-template-columns:1fr}
  .top-grid{grid-template-columns:repeat(2,1fr)}
}

/* ═══════ RESPONSIVE: MOBILE ═══════ */
@media(max-width:768px){
  .sidebar{display:none!important;width:0!important;visibility:hidden!important}
  .mobile-nav{display:block!important}
  .mobile-toolbar{display:flex!important}
  .main{margin-left:0!important;padding:52px 12px 68px 12px!important;max-width:100%!important}
  .header{display:none!important}

  .stats,.stats-4,.stats-3{grid-template-columns:1fr 1fr!important;gap:8px!important}
  .stat{padding:12px 10px}
  .stat-v{font-size:18px}
  .stat-l{font-size:8px;letter-spacing:.8px}
  .stat-mini{font-size:9px}

  .filter-bar{padding:8px;gap:4px;margin:8px 0 16px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-chip{padding:8px 14px;font-size:12px;flex-shrink:0}
  .filter-label{display:none}

  .sec-title{font-size:16px}
  .sec-desc{font-size:11px}
  section{margin-bottom:24px}

  .grid2{gap:10px}
  .box{padding:12px;border-radius:8px}
  .box-title{font-size:10px;margin-bottom:8px}

  .top-grid{grid-template-columns:1fr 1fr!important;gap:8px!important}
  .top-card{padding:10px 8px}
  .top-amt{font-size:15px}
  .top-rank{font-size:16px}
  .top-vendor{font-size:10px}

  .search-input{padding:12px 14px;font-size:14px;border-radius:10px}
  .search-count{font-size:10px}

  .hbar-label{width:65px;font-size:10px}
  .hbar-val{width:60px;font-size:10px}

  .ot-card{padding:10px;gap:6px;border-radius:8px}
  .ot-name{font-size:11px}
  .ot-meta{font-size:9px}
  .ot-amount{font-size:13px}
  .ot-icon{width:28px;height:28px;border-radius:6px}

  table{font-size:10px}
  thead th{padding:8px 6px;font-size:9px}
  tbody td{padding:7px 6px}
  .tw{border-radius:8px}

  .donut-wrap{flex-direction:column;gap:12px;align-items:center}
  .donut-wrap svg{width:160px;height:160px}
  .legend{width:100%}

  .insight-grid{gap:8px}
  .insight{padding:10px;border-radius:6px}
  .insight-t{font-size:11px}
  .insight-d{font-size:10px}

  .heatmap{overflow:visible}
  .hm-cell{font-size:7px;min-height:24px;padding:3px 2px;min-width:40px}
  .hm-row-label{font-size:9px;padding-right:4px;min-width:70px;flex-shrink:0}
  .hm-header{font-size:8px;min-width:40px}

  .spark-bar{width:18px}
  .spark-bar .sv{font-size:7px!important;top:-14px}
  .spark-lbl{font-size:8px}
  .spark-sub{font-size:8px}
  .spark-area{height:100px!important}

  .split-bar{height:28px;border-radius:6px}
  .split-seg{font-size:10px}

  .line-chart{padding:10px}
  .line-chart text{font-size:8px}

  .chart-tooltip{font-size:10px;padding:8px 12px}

  .bar-stick{width:14px}
  .bar-stick .bv{font-size:6px}
  .bar-area{height:120px}
}

/* ═══════ PRINT ═══════ */
@media print{
  .sidebar,.filter-bar,.search-bar,.sidebar-footer,.mobile-nav,.mobile-toolbar{display:none!important}
  .main{margin-left:0!important;padding:10px!important;max-width:100%!important}
  .header{display:block!important}
  body{background:#fff;color:#111}
  .box,.stat,.tw{break-inside:avoid}
  section{break-before:auto}
  @page{size:A4;margin:14mm}
}
</style>
</head>
<body>

<!-- ═══ MOBILE TOOLBAR ═══ -->
<div class="mobile-toolbar" id="mobileToolbar">
  <div class="mob-title">Srimitra Lifestyle</div>
  <div class="mob-actions">
    <button class="mob-btn" id="mobTheme" onclick="toggleTheme()">☀️</button>
    <a class="mob-btn" href="accounts.html" style="text-decoration:none;display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--teal);border-color:var(--teal)">🏦 Income</a>
    <button class="mob-btn" onclick="window.print()">📄</button>
  </div>
</div>

<!-- ═══ SIDEBAR ═══ -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">Srimitra Lifestyle</div>
  <div class="sidebar-nav" id="sidebarNav"></div>
  <div class="sidebar-footer" style="flex-direction:column;gap:6px">
    <div style="display:flex;gap:8px"><button class="sidebar-btn" id="btnTheme" onclick="toggleTheme()">Light</button>
    <button class="sidebar-btn" onclick="window.print()">Print/PDF</button></div>
    <a class="sidebar-btn" href="accounts.html" style="background:rgba(45,212,191,.1);border-color:var(--teal);color:var(--teal);font-weight:600;text-decoration:none;display:block">&rarr; Account Statement</a>
  </div>
</nav>

<!-- ═══ MOBILE BOTTOM NAV ═══ -->
<div class="mobile-nav" id="mobileNav"><div class="mobile-nav-inner" id="mobileNavInner"></div></div>

<!-- ═══ MAIN ═══ -->
<div class="main" id="main">
  <div class="header">
    <h1>Expenditure Dashboard</h1>
    <div class="header-sub" id="headerSub"></div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div id="content"></div>
  <div class="footer" id="footer"></div>
</div>

<div class="chart-tooltip" id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════

function renderStats(qs,mo,ts,tr){
  const avg=ts/mo, last=qs[qs.length-1];
  const dailyBurn=Math.round(ts/(mo*30.44));
  const peakMonth=MONTHLY.reduce((a,b)=>b.v>a.v?b:a,MONTHLY[0]);
  const lowMonth=MONTHLY.reduce((a,b)=>b.v<a.v?b:a,MONTHLY[0]);
  const projected=avg*12;
  return `<div class="stats stats-4">
    <div class="stat stat-accent" style="border-color:var(--accent)"><div class="stat-v">${fmt(ts)}</div><div class="stat-l">Total Expenditure (${mo} mo)</div><div class="stat-mini">${fmt(dailyBurn)}/day burn rate</div></div>
    <div class="stat stat-accent" style="border-color:var(--green)"><div class="stat-v n">${fmt(avg)}</div><div class="stat-l">Monthly Average</div><div class="stat-mini">Projected: ${fmt(projected)}/year</div></div>
    <div class="stat stat-accent" style="border-color:var(--amber)"><div class="stat-v" style="color:var(--red)">${fmt(peakMonth.v)}</div><div class="stat-l">Peak: ${peakMonth.m}</div><div class="stat-mini">Low: ${lowMonth.m} (${fmt(lowMonth.v)})</div></div>
    <div class="stat stat-accent" style="border-color:var(--blue)"><div class="stat-v up">${fmt(last.total)}</div><div class="stat-l">Latest: ${last.label}</div><div class="stat-mini">${fmt(last.total/last.months)}/mo avg</div></div>
  </div>`;
}

function renderOverviewCharts(qs){
  const maxAvg=Math.max(...qs.map(q=>q.total/q.months));
  let barsH=`<div class="box"><div class="box-title">Monthly Average per Quarter</div><div>`;
  qs.forEach(q=>{
    const avg=q.total/q.months, w=Math.round(avg/maxAvg*100);
    const col=avg===maxAvg?"var(--red)":avg===Math.min(...qs.map(x=>x.total/x.months))?"var(--green)":"";
    barsH+=`<div class="hbar-row"><div class="hbar-label">${q.label}</div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:var(--accent);border-radius:5px"></div></div><div class="hbar-val"${col?` style="color:${col}"`:``}>${fmt(q.total/q.months)}</div></div>`;
  });
  barsH+=`</div></div>`;

  const maxR=Math.max(...qs.map(q=>q.receipts));
  let recH=`<div class="box"><div class="box-title">Receipts per Quarter</div><div>`;
  qs.forEach(q=>{
    const w=maxR?Math.max(2,Math.round(q.receipts/maxR*100)):2;
    recH+=`<div class="hbar-row"><div class="hbar-label">${q.label}</div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:var(--green);border-radius:5px"></div></div><div class="hbar-val">${fmt(q.receipts)}</div></div>`;
  });
  recH+=`</div></div>`;
  return `<div class="grid2">${barsH}${recH}</div>`;
}

// ═══════════════════════════════════════════════════════════
function renderQuarterlyBars(qs){
  const max=Math.max(...qs.map(q=>q.total));
  const colors=["#4338ca","#4f46e5","#6366f1","#7c3aed","#8b5cf6","#9333ea","#a855f7","#c084fc"];
  let h=`<div class="box" style="margin-bottom:16px"><div class="box-title">Quarterly Spending</div><div class="spark-row" style="grid-template-columns:repeat(${qs.length},1fr)">`;
  qs.forEach((q,i)=>{
    const pctH=Math.round(q.total/max*100);
    const isMax=q.total===max;
    h+=`<div class="spark-col"><div class="spark-area"><div class="spark-bar" style="height:${pctH}%;background:linear-gradient(to top,${colors[i%colors.length]},${colors[(i+1)%colors.length]})"><span class="sv"${isMax?' style="color:var(--red)"':''}>${fmt(q.total)}</span></div></div><div class="spark-lbl">${q.label.split("\u2013")[0]}</div><div class="spark-sub">${q.label.includes("2024")?"2024":q.label.includes("2025")?"2025":"2026"}${q.months===2?" (2mo)":""}</div></div>`;
  });
  h+=`</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
function renderPeriodTable(qs,mo,ts,tr){
  let h=`<div class="tw"><table><thead><tr><th>Period</th><th>Mo</th><th class="num">Total</th><th class="num">Monthly Avg</th><th class="num">Receipts</th><th class="num">Net</th><th class="num">QoQ</th></tr></thead><tbody>`;
  qs.forEach((q,i)=>{
    const prev=i>0?qs[i-1]:null;
    const chg=prev?pct(q.total,prev.total):null;
    const pc=chg!==null?pillClass(+chg):"fl";
    h+=`<tr><td><strong>${q.label}</strong></td><td>${q.months}</td><td class="num">${fmt(q.total)}</td><td class="num">${fmt(q.total/q.months)}</td><td class="num">${fmt(q.receipts)}</td><td class="num">${fmt(q.total-q.receipts)}</td><td class="num">${chg!==null?`<span class="pill ${pc}">${+chg>0?"+":""}${chg}%</span>`:`<span class="pill fl">Base</span>`}</td></tr>`;
  });
  h+=`<tr class="tr-total"><td><strong>TOTAL</strong></td><td>${mo}</td><td class="num"><strong>${fmt(ts)}</strong></td><td class="num"><strong>${fmt(ts/mo)}</strong></td><td class="num"><strong>${fmt(tr)}</strong></td><td class="num"><strong>${fmt(ts-tr)}</strong></td><td></td></tr>`;
  h+=`</tbody></table></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
//  CATEGORY SECTION
// ═══════════════════════════════════════════════════════════
function renderCategorySection(qs,ts){
  const cats=Object.keys(CAT_META);
  const totals=cats.map(c=>({key:c,...CAT_META[c],total:catTotal(c)})).sort((a,b)=>b.total-a.total);
  const top5=totals.slice(0,6), rest=totals.slice(6);
  const restSum=rest.reduce((s,c)=>s+c.total,0);

  // Donut
  const donutData=[...top5,{key:"_rest",label:"All Others",color:"#6b7280",total:restSum}];
  const circ=2*Math.PI*80;
  let offset=circ*0.25;
  let arcs="";
  donutData.forEach(d=>{
    const share=d.total/ts;
    const dash=share*circ;
    arcs+=`<circle cx="100" cy="100" r="80" fill="none" stroke="${d.color}" stroke-width="28" stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" transform="rotate(-90 100 100)"/>`;
    offset-=dash;
  });
  let legendH=donutData.map(d=>`<div class="legend-row"><span class="legend-dot" style="background:${d.color}"></span><span class="legend-name">${d.label}</span><span class="legend-val">${(d.total/ts*100).toFixed(1)}%</span></div>`).join("");

  let donut=`<div class="box"><div class="box-title">Spending Distribution</div><div class="donut-wrap">
    <svg width="180" height="180" viewBox="0 0 200 200"><circle cx="100" cy="100" r="80" fill="none" stroke="var(--border)" stroke-width="28"/>${arcs}<circle cx="100" cy="100" r="58" fill="var(--surface)"/><text x="100" y="96" text-anchor="middle" style="font-size:16px;font-weight:700;fill:var(--text)">${fmt(ts)}</text><text x="100" y="112" text-anchor="middle" style="font-size:10px;fill:var(--text3)">TOTAL</text></svg>
    <div class="legend">${legendH}</div></div></div>`;

  // Category trend table
  let tbl=`<div class="tw"><table><thead><tr><th>Category</th>`;
  qs.forEach(q=>tbl+=`<th class="num">${q.label.replace(/\u2013/g,"\u2013").substring(0,7)}</th>`);
  tbl+=`<th class="num">Total</th><th class="num">Share</th><th style="width:80px">Trend</th></tr></thead><tbody>`;
  totals.forEach(c=>{
    const vals=qs.map(q=>q.cats[c.key]||0);
    const catMax=Math.max(...vals,1);
    const first=vals[0],last=vals[vals.length-1];
    const trend=first>0?((last-first)/first*100).toFixed(0):last>0?"+new":"flat";
    const trendColor=+trend>5?"var(--red)":+trend<-5?"var(--green)":"var(--text3)";
    const sparkSvg=vals.length>1?`<svg width="70" height="20" viewBox="0 0 70 20">${vals.map((v,i)=>{const bw=Math.max(2,60/vals.length-1);return`<rect x="${i*(70/vals.length)}" y="${20-Math.max(1,v/catMax*18)}" width="${bw}" height="${Math.max(1,v/catMax*18)}" fill="${c.color}" rx="1" opacity="${0.4+0.6*(v/catMax)}"/>`}).join("")}</svg>`:"";
    tbl+=`<tr><td><span class="cat-dot" style="background:${c.color}"></span><strong>${c.label}</strong></td>`;
    qs.forEach(q=>tbl+=`<td class="num">${fmt(q.cats[c.key]||0)}</td>`);
    tbl+=`<td class="num"><strong>${fmt(c.total)}</strong></td><td class="num">${(c.total/ts*100).toFixed(1)}%</td><td style="text-align:center">${sparkSvg}</td></tr>`;
  });
  tbl+=`</tbody></table></div>`;

  // Top bars
  const maxCat=totals[0].total;
  let bars=`<div class="box"><div class="box-title">Top Categories</div>`;
  totals.slice(0,5).forEach(c=>{
    const w=Math.round(c.total/maxCat*100);
    bars+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600"><span class="cat-dot" style="background:${c.color}"></span>${c.label}</span><span style="font-size:12px;font-weight:700;color:${c.color}">${fmt(c.total)}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:${c.color};border-radius:5px"></div></div><div style="font-size:9px;color:var(--text3);margin-top:2px">${(c.total/ts*100).toFixed(1)}% of total | ${fmt(c.total/totalMonths())}/month</div></div>`;
  });
  bars+=`</div>`;

  return `<div class="grid2">${donut}${bars}</div>${tbl}`;
}

// ═══════════════════════════════════════════════════════════
//  MONTHLY BREAKDOWN
// ═══════════════════════════════════════════════════════════
function renderMonthlyBreakdown(){
  const fm=selMonthly();
  if(fm.length===0) return `<div class="box"><p style="color:var(--text3);font-size:12px">No monthly data for the selected quarters.</p></div>`;
  const max=Math.max(...fm.map(m=>m.v));
  const min=Math.min(...fm.map(m=>m.v));
  const avg=fm.reduce((s,m)=>s+m.v,0)/fm.length;
  const avgPct=Math.round(avg/max*100);
  const cols=fm.length;

  let h=`<div class="box" style="margin-bottom:16px"><div class="box-title">Monthly Spending (${fm.length} months)</div>`;
  h+=`<div class="month-bar-wrap">`;
  h+=`<div class="month-avg-line" style="bottom:${avgPct}%;"><span class="month-avg-label">Avg: ${fmt(avg)}</span></div>`;
  h+=`<div class="spark-row" style="grid-template-columns:repeat(${cols},1fr)">`;
  fm.forEach(m=>{
    const pctH=Math.round(m.v/max*100);
    const isMax=m.v===max, isMin=m.v===min;
    const color=isMax?"var(--red)":isMin?"var(--green)":"var(--accent2)";
    const bg=isMax?"linear-gradient(to top,#dc2626,#ef4444)":isMin?"linear-gradient(to top,#059669,#34d399)":"linear-gradient(to top,var(--accent),var(--accent2))";
    h+=`<div class="spark-col"><div class="spark-area" style="height:140px"><div class="spark-bar" style="height:${pctH}%;background:${bg};width:28px"><span class="sv" style="color:${color};font-size:8px">${fmtL(m.v)}</span></div></div><div class="spark-lbl" style="font-size:9px">${m.m.split(" ")[0].substring(0,3)}</div><div class="spark-sub">${m.m.split(" ")[1]||""}</div></div>`;
  });
  h+=`</div></div></div>`;

  h+=`<div class="grid2">`;
  h+=`<div class="box"><div class="box-title">Month-wise Details</div>`;
  h+=`<div class="tw"><table><thead><tr><th>Month</th><th class="num">Spending</th><th class="num">Daily Avg</th><th class="num">MoM Change</th></tr></thead><tbody>`;
  fm.forEach((m,i)=>{
    const prev=i>0?fm[i-1]:null;
    const chg=prev?pct(m.v,prev.v):null;
    const pc=chg!==null?pillClass(+chg):"fl";
    const daily=Math.round(m.v/30.44);
    const isMax=m.v===max, isMin=m.v===min;
    const style=isMax?' style="background:var(--red-bg)"':isMin?' style="background:var(--green-bg)"':"";
    h+=`<tr${style}><td><strong>${m.m}</strong>${isMax?' <span class="pill up">HIGHEST</span>':''}${isMin?' <span class="pill dn">LOWEST</span>':''}</td><td class="num">${fmt(m.v)}</td><td class="num">${fmt(daily)}</td><td class="num">${chg!==null?`<span class="pill ${pc}">${+chg>0?"+":""}${chg}%</span>`:`<span class="pill fl">Base</span>`}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;

  h+=`<div class="box"><div class="box-title">Monthly Highlights</div>`;
  const sorted=[...fm].sort((a,b)=>b.v-a.v);
  const topN=Math.min(5,sorted.length);
  h+=`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)">Top ${topN} Costliest Months</div>`;
  sorted.slice(0,topN).forEach((m,i)=>{
    const w=Math.round(m.v/max*100);
    h+=`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:11px"><strong>#${i+1}</strong> ${m.m}</span><span style="font-size:11px;font-weight:700;color:var(--red)">${fmt(m.v)}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:linear-gradient(90deg,var(--red),#fca5a5);border-radius:5px"></div></div></div>`;
  });
  h+=`</div>`;
  const botN=Math.min(5,sorted.length);
  h+=`<div><div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)">Top ${botN} Lowest Months</div>`;
  sorted.slice(-botN).reverse().forEach((m,i)=>{
    const w=Math.round(m.v/max*100);
    h+=`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:11px"><strong>#${i+1}</strong> ${m.m}</span><span style="font-size:11px;font-weight:700;color:var(--green)">${fmt(m.v)}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:linear-gradient(90deg,var(--green),#a7f3d0);border-radius:5px"></div></div></div>`;
  });
  h+=`</div></div>`;
  h+=`</div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
//  SPENDING HEATMAP (Category x Month)
// ═══════════════════════════════════════════════════════════
function renderHeatmap(){
  const cats=Object.keys(CAT_META).filter(c=>catTotal(c)>0);
  cats.sort((a,b)=>catTotal(b)-catTotal(a));
  const fm=selMonthly();
  if(fm.length===0) return `<div class="box"><p style="color:var(--text3);font-size:12px">No data for the selected quarters.</p></div>`;
  const monthLabels=fm.map(m=>m.m);
  const ft=selTxn();
  const monthTxnTotals={};
  ft.forEach(t=>{
    const d=new Date(t[0]);
    const key=d.toLocaleString("en-US",{month:"short"})+" "+String(d.getFullYear()).slice(2);
    if(!monthTxnTotals[key]) monthTxnTotals[key]={};
    if(!monthTxnTotals[key][t[3]]) monthTxnTotals[key][t[3]]=0;
    monthTxnTotals[key][t[3]]+=t[2];
  });

  let allVals=[];
  cats.forEach(c=>{
    monthLabels.forEach(ml=>{
      const v=monthTxnTotals[ml]?.[c]||0;
      if(v>0) allVals.push(v);
    });
  });
  const maxVal=Math.max(...allVals,1);

  const gridCols=`80px repeat(${monthLabels.length},1fr)`;
  const minW=80+monthLabels.length*44;
  let h=`<div class="box"><div class="box-title">Category x Month Heatmap</div>`;
  h+=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div class="heatmap" style="grid-template-columns:${gridCols};min-width:${minW}px">`;
  h+=`<div class="hm-header"></div>`;
  monthLabels.forEach(ml=>h+=`<div class="hm-header">${ml.split(" ")[0].substring(0,3)}<br>${ml.split(" ")[1]||""}</div>`);

  cats.forEach(c=>{
    const meta=CAT_META[c];
    h+=`<div class="hm-row-label"><span class="cat-dot" style="background:${meta.color}"></span>${meta.label.substring(0,12)}</div>`;
    monthLabels.forEach(ml=>{
      const v=monthTxnTotals[ml]?.[c]||0;
      const intensity=v>0?Math.max(0.1,Math.min(1,v/maxVal)):0;
      const r=parseInt(meta.color.slice(1,3),16);
      const g=parseInt(meta.color.slice(3,5),16);
      const b=parseInt(meta.color.slice(5,7),16);
      const bg=v>0?`rgba(${r},${g},${b},${(intensity*0.7+0.1).toFixed(2)})`:"transparent";
      const textColor=intensity>0.4?"#fff":"var(--text3)";
      h+=`<div class="hm-cell" style="background:${bg};color:${textColor}" title="${meta.label} | ${ml}: ${fmt(v)}">${v>0?fmtL(v):""}</div>`;
    });
  });
  h+=`</div>`;
  h+=`</div></div>`;
  h+=`<div class="hm-legend"><span>Low</span><div class="hm-legend-bar"></div><span>High</span></div>`;
  h+=`</div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
//  RECURRING vs ONE-TIME ANALYSIS
// ═══════════════════════════════════════════════════════════
function renderOneTimeAnalysis(){
  const ft=selTxn();
  if(ft.length===0) return `<div class="box"><p style="color:var(--text3);font-size:12px">No transactions for the selected quarters.</p></div>`;
  const vendorMonths={};
  ft.forEach(t=>{
    const v=t[1].replace(/\s*\(.*?\)/g,"").trim();
    const m=t[0].substring(0,7);
    if(!vendorMonths[v]) vendorMonths[v]={months:new Set(),total:0,txns:[],cat:t[3]};
    vendorMonths[v].months.add(m);
    vendorMonths[v].total+=t[2];
    vendorMonths[v].txns.push(t);
  });

  let recurringTotal=0, onetimeTotal=0;
  const onetimeItems=[], recurringItems=[];
  Object.entries(vendorMonths).forEach(([vendor,data])=>{
    const isRecurring=data.months.size>=3;
    if(isRecurring){
      recurringTotal+=data.total;
      recurringItems.push({vendor,total:data.total,count:data.txns.length,months:data.months.size,cat:data.cat});
    } else {
      onetimeTotal+=data.total;
      data.txns.forEach(t=>onetimeItems.push({vendor:t[1],amount:t[2],date:t[0],cat:t[3],vendorMonths:data.months.size}));
    }
  });
  onetimeItems.sort((a,b)=>b.amount-a.amount);

  const grand=recurringTotal+onetimeTotal;
  const rPct=(recurringTotal/grand*100).toFixed(1);
  const oPct=(onetimeTotal/grand*100).toFixed(1);

  let h=`<div class="stats stats-3">
    <div class="stat stat-accent" style="border-color:var(--accent)"><div class="stat-v">${fmt(recurringTotal)}</div><div class="stat-l">Recurring (${rPct}%)</div><div class="stat-mini">${recurringItems.length} vendors, 3+ months</div></div>
    <div class="stat stat-accent" style="border-color:var(--amber)"><div class="stat-v" style="color:var(--amber)">${fmt(onetimeTotal)}</div><div class="stat-l">One-Time / Ad-hoc (${oPct}%)</div><div class="stat-mini">${onetimeItems.length} transactions</div></div>
    <div class="stat stat-accent" style="border-color:var(--green)"><div class="stat-v n">${fmt(grand)}</div><div class="stat-l">Total Tracked</div><div class="stat-mini">${ft.length} transactions</div></div>
  </div>`;

  h+=`<div class="split-bar"><div class="split-seg" style="width:${rPct}%;background:linear-gradient(90deg,var(--accent),var(--accent2))">${rPct}% Recurring</div><div class="split-seg" style="width:${oPct}%;background:linear-gradient(90deg,var(--amber),#f59e0b)">${oPct}% One-Time</div></div>`;

  h+=`<div class="grid2">`;

  // One-time expenses list
  h+=`<div class="box"><div class="box-title">One-Time &amp; Ad-Hoc Expenses (${onetimeItems.length} items — ${fmt(onetimeTotal)})</div>`;
  const grouped={};
  onetimeItems.forEach(item=>{
    const label=item.amount>=20000?"Major Purchase/Repair":item.amount>=5000?"Moderate Expense":"Minor Expense";
    if(!grouped[label]) grouped[label]=[];
    grouped[label].push(item);
  });
  Object.entries(grouped).forEach(([label,items])=>{
    const groupTotal=items.reduce((s,i)=>s+i.amount,0);
    h+=`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between"><span>${label} (${items.length})</span><span>${fmt(groupTotal)}</span></div>`;
    items.forEach(item=>{
      const meta=CAT_META[item.cat]||CAT_META.others;
      const purpose=PURPOSE[item.vendor]||PURPOSE[item.vendor.replace(/\s*\(.*?\)/g,"").trim()]||"";
      h+=`<div class="ot-card"><div class="ot-left"><div class="ot-icon" style="background:${meta.color}22;color:${meta.color}"><span class="cat-dot" style="background:${meta.color};width:10px;height:10px"></span></div><div><div class="ot-name">${item.vendor}</div><div class="ot-meta">${item.date} · ${meta.label}${purpose?` · <em>${purpose}</em>`:""}</div></div></div><div class="ot-amount" style="color:${meta.color}">${fmt(item.amount)}</div></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;

  // Recurring contracts summary
  recurringItems.sort((a,b)=>b.total-a.total);
  const maxRec=recurringItems[0]?.total||1;
  h+=`<div class="box"><div class="box-title">Recurring Contracts (${recurringItems.length} vendors — ${fmt(recurringTotal)})</div>`;
  recurringItems.forEach(r=>{
    const meta=CAT_META[r.cat]||CAT_META.others;
    const w=Math.round(r.total/maxRec*100);
    const monthly=Math.round(r.total/r.months);
    h+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:11px;font-weight:600"><span class="cat-dot" style="background:${meta.color}"></span>${r.vendor}</span><span style="font-size:11px;font-weight:700">${fmt(r.total)}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:${meta.color};border-radius:5px"></div></div><div style="font-size:9px;color:var(--text3);margin-top:1px">${r.count} txns over ${r.months} months · ~${fmt(monthly)}/mo</div></div>`;
  });
  h+=`</div>`;

  h+=`</div>`;

  // One-time by category pie
  const otByCat={};
  onetimeItems.forEach(i=>{
    if(!otByCat[i.cat]) otByCat[i.cat]=0;
    otByCat[i.cat]+=i.amount;
  });
  const otCats=Object.entries(otByCat).sort((a,b)=>b[1]-a[1]);
  h+=`<div class="box" style="margin-top:10px"><div class="box-title">One-Time Expenses by Category</div>`;
  const maxOtCat=otCats[0]?.[1]||1;
  otCats.forEach(([cat,total])=>{
    const meta=CAT_META[cat]||CAT_META.others;
    const w=Math.round(total/maxOtCat*100);
    h+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:11px;font-weight:600"><span class="cat-dot" style="background:${meta.color}"></span>${meta.label}</span><span style="font-size:11px;font-weight:700;color:${meta.color}">${fmt(total)} <span style="color:var(--text3);font-weight:400">(${(total/onetimeTotal*100).toFixed(1)}%)</span></span></div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:${meta.color};border-radius:5px"></div></div></div>`;
  });
  h+=`</div>`;

  return h;
}

// ═══════════════════════════════════════════════════════════
//  TOP PAYMENTS
// ═══════════════════════════════════════════════════════════
function renderTopSpends(){
  const ft=selTxn();
  if(ft.length===0) return `<div class="box"><p style="color:var(--text3);font-size:12px">No transactions for the selected quarters.</p></div>`;
  const sorted=[...ft].sort((a,b)=>b[2]-a[2]);
  const top=sorted.slice(0,10);
  let h=`<div class="top-grid">`;
  top.slice(0,5).forEach((t,i)=>{
    const meta=CAT_META[t[3]]||CAT_META.others;
    h+=`<div class="top-card" style="border-top:3px solid ${meta.color}"><div class="top-rank">#${i+1}</div><div class="top-amt">${fmt(t[2])}</div><div class="top-vendor">${t[1]}</div><div class="top-detail">${t[0]} &bull; ${meta.label}</div></div>`;
  });
  h+=`</div>`;
  if(top.length>5){
    h+=`<div class="top-grid">`;
    top.slice(5,10).forEach((t,i)=>{
      const meta=CAT_META[t[3]]||CAT_META.others;
      h+=`<div class="top-card" style="border-top:3px solid ${meta.color}"><div class="top-rank">#${i+6}</div><div class="top-amt">${fmt(t[2])}</div><div class="top-vendor">${t[1]}</div><div class="top-detail">${t[0]} &bull; ${meta.label}</div></div>`;
    });
    h+=`</div>`;
  }

  const catTotals={};
  ft.forEach(t=>{
    if(!catTotals[t[3]]) catTotals[t[3]]={count:0,total:0,max:0,maxVendor:""};
    catTotals[t[3]].count++;
    catTotals[t[3]].total+=t[2];
    if(t[2]>catTotals[t[3]].max){catTotals[t[3]].max=t[2];catTotals[t[3]].maxVendor=t[1]}
  });
  h+=`<div class="box" style="margin-top:14px"><div class="box-title">Vendor Concentration</div>`;
  const vendorTotals={};
  ft.forEach(t=>{
    const v=t[1].replace(/\s*\(.*?\)/g,"").trim();
    if(!vendorTotals[v]) vendorTotals[v]={total:0,count:0,cat:t[3]};
    vendorTotals[v].total+=t[2];
    vendorTotals[v].count++;
  });
  const topVendors=Object.entries(vendorTotals).sort((a,b)=>b[1].total-a[1].total).slice(0,8);
  const maxVendor=topVendors[0][1].total;
  topVendors.forEach(([name,data])=>{
    const meta=CAT_META[data.cat]||CAT_META.others;
    const w=Math.round(data.total/maxVendor*100);
    h+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:11px;font-weight:600">${name}</span><span style="font-size:11px;font-weight:700">${fmt(data.total)} <span style="color:var(--text3);font-weight:400">(${data.count} txns)</span></span></div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:${meta.color};border-radius:5px"></div></div></div>`;
  });
  h+=`</div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
//  YEAR-OVER-YEAR
// ═══════════════════════════════════════════════════════════
function renderYoY(){
  const qs=sel();
  const pairs=[];
  qs.forEach((q,i)=>{
    qs.forEach((q2,j)=>{
      if(j>i && q.months===q2.months && q.label.split(" ")[0]===q2.label.split(" ")[0] && q.label.split(" ")[0].includes("\u2013")){
        pairs.push({older:q,newer:q2});
      }
    });
  });
  const janMarOld=qs.find(q=>q.id==="q4fy25");
  const janMarNew=qs.find(q=>q.id==="q4fy26");
  if(janMarOld&&janMarNew&&!pairs.find(p=>p.older.id===janMarOld.id)){
    pairs.push({older:janMarOld,newer:janMarNew});
  }

  if(pairs.length===0) return `<div class="box"><p style="color:var(--text3);font-size:12px">Select matching quarters (e.g. Jan\u2013Mar 2025 + Jan\u2013Mar 2026) to see year-over-year comparison.</p></div>`;

  let h="";
  pairs.forEach(({older,newer})=>{
    const chg=pct(newer.total,older.total);
    h+=`<div class="box" style="margin-bottom:14px"><div class="box-title">${older.label} vs ${newer.label}</div>`;
    h+=`<div class="stats stats-3" style="margin-bottom:12px">
      <div class="stat"><div class="stat-v">${fmt(older.total)}</div><div class="stat-l">${older.label}</div></div>
      <div class="stat"><div class="stat-v">${fmt(newer.total)}</div><div class="stat-l">${newer.label}</div></div>
      <div class="stat"><div class="stat-v ${pillClass(+chg)}">${+chg>0?"+":""}${chg}%</div><div class="stat-l">YoY Change</div></div>
    </div>`;
    const cats=Object.keys(CAT_META).filter(c=>(older.cats[c]||0)+(newer.cats[c]||0)>0);
    h+=`<div class="tw"><table><thead><tr><th>Category</th><th class="num">${older.label}</th><th class="num">${newer.label}</th><th class="num">Change</th></tr></thead><tbody>`;
    cats.sort((a,b)=>((newer.cats[b]||0)+(older.cats[b]||0))-((newer.cats[a]||0)+(older.cats[a]||0)));
    cats.forEach(c=>{
      const o=older.cats[c]||0,n=newer.cats[c]||0;
      const ch=o?pct(n,o):n>0?"+new":"\u2014";
      const pc=typeof ch==="string"&&ch!=="\u2014"?pillClass(parseFloat(ch)):"fl";
      h+=`<tr><td><span class="cat-dot" style="background:${CAT_META[c].color}"></span>${CAT_META[c].label}</td><td class="num">${fmt(o)}</td><td class="num">${fmt(n)}</td><td class="num"><span class="pill ${pc}">${typeof ch==="string"?ch:(+ch>0?"+":"")+ch+"%"}</span></td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  });
  return h;
}

// ═══════════════════════════════════════════════════════════
//  CUMULATIVE LINE CHART
// ═══════════════════════════════════════════════════════════
function renderLineChart(){
  const wrap=el("lineChartWrap");
  if(!wrap)return;
  const fm=selMonthly();
  if(fm.length===0){wrap.innerHTML=`<p style="color:var(--text3);font-size:12px;padding:16px">No data for the selected quarters.</p>`;return}
  const W=800,H=280,PL=60,PR=20,PT=30,PB=40;
  const cw=W-PL-PR, ch=H-PT-PB;
  let cum=0;
  const pts=fm.map((m,i)=>{cum+=m.v;return{...m,cum,i}});
  const maxY=pts[pts.length-1].cum;
  const avg=cum/fm.length;
  const x=i=>PL+i/(pts.length-1)*cw;
  const y=v=>PT+ch-(v/maxY)*ch;

  let gridLines="";
  for(let i=0;i<=4;i++){
    const val=maxY/4*i;
    gridLines+=`<line x1="${PL}" y1="${y(val)}" x2="${W-PR}" y2="${y(val)}" class="grid-line"/>`;
    gridLines+=`<text x="${PL-8}" y="${y(val)+4}" text-anchor="end" style="font-size:9px">${fmt(val)}</text>`;
  }
  let xLabels=pts.map((p,i)=>i%2===0||i===pts.length-1?`<text x="${x(i)}" y="${H-8}" text-anchor="middle" style="font-size:9px">${p.m}</text>`:"").join("");
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(p.cum).toFixed(1)}`).join(" ");
  const avgY=y(avg*MONTHLY.length/2);
  let dots=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.cum).toFixed(1)}" r="3.5" class="dot" data-tip="${p.m}: ${fmt(p.v)} | Cumulative: ${fmt(p.cum)}"/>`).join("");

  wrap.innerHTML=`<div class="box-title">Cumulative Expenditure (${fmt(cum)} over ${fm.length} months)</div>
    <div style="position:relative"><svg viewBox="0 0 ${W} ${H}">${gridLines}
    <line x1="${PL}" y1="${y(avg*(pts.length))}" x2="${W-PR}" y2="${y(avg)}" class="avg-line"/>
    <text x="${W-PR+2}" y="${y(avg)-4}" style="font-size:9px;fill:var(--amber)">avg</text>
    <path d="${path}" class="data-line"/>${dots}${xLabels}</svg></div>`;

  wrap.querySelectorAll(".dot").forEach(dot=>{
    dot.addEventListener("mouseenter",e=>{
      const tt=el("tooltip");
      tt.textContent=dot.dataset.tip;
      tt.style.display="block";
      const r=wrap.getBoundingClientRect();
      tt.style.left=(e.clientX-r.left+10)+"px";
      tt.style.top=(e.clientY-r.top-30)+"px";
    });
    dot.addEventListener("mouseleave",()=>{el("tooltip").style.display="none"});
  });
}

// ═══════════════════════════════════════════════════════════
//  TRANSACTION TABLE
// ═══════════════════════════════════════════════════════════
function getFilteredTxns(){
  let data=selTxn().map(t=>({date:t[0],vendor:t[1],amount:t[2],cat:t[3]}));
  if(txnSearch){
    const s=txnSearch.toLowerCase();
    data=data.filter(t=>t.vendor.toLowerCase().includes(s)||t.cat.toLowerCase().includes(s)||(CAT_META[t.cat]?.label||"").toLowerCase().includes(s));
  }
  const cols=["date","vendor","amount","cat"];
  data.sort((a,b)=>{
    let va=a[cols[txnSortCol]],vb=b[cols[txnSortCol]];
    if(typeof va==="string") return txnSortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return txnSortAsc?va-vb:vb-va;
  });
  return data;
}
function renderTxnTable(){
  const data=getFilteredTxns();
  const total=data.reduce((s,t)=>s+t.amount,0);
  el("txnCount").textContent=`${data.length} transactions | Total: ${fmt(total)}`;
  const cols=["Date","Vendor","Amount","Category"];
  let h=`<div class="tw"><table><thead><tr>`;
  cols.forEach((c,i)=>{
    const sorted=i===txnSortCol;
    h+=`<th class="${i===2?"num":""} ${sorted?"sorted":""}${sorted&&!txnSortAsc?" desc":""}" onclick="sortTxn(${i})">${c}</th>`;
  });
  h+=`</tr></thead><tbody>`;
  data.slice(0,200).forEach(t=>{
    const meta=CAT_META[t.cat]||CAT_META.others;
    h+=`<tr><td style="white-space:nowrap">${t.date}</td><td>${t.vendor}</td><td class="num">${fmt(t.amount)}</td><td><span class="cat-dot" style="background:${meta.color}"></span>${meta.label}</td></tr>`;
  });
  if(data.length>200) h+=`<tr><td colspan="4" style="text-align:center;color:var(--text3);font-size:11px">Showing top 200 of ${data.length} results</td></tr>`;
  h+=`</tbody></table></div>`;
  el("txnTableWrap").innerHTML=h;
}
function onTxnSearch(v){txnSearch=v;renderTxnTable();}
function sortTxn(col){
  if(txnSortCol===col) txnSortAsc=!txnSortAsc;
  else{txnSortCol=col;txnSortAsc=col===2?false:true;}
  renderTxnTable();
}

// ═══════════════════════════════════════════════════════════
//  INSIGHTS
// ═══════════════════════════════════════════════════════════
function renderBankComparison(qs){
  const bKeys=Object.keys(BANK_QUARTERLY);
  const selQIds=qs.map(q=>q.id);
  const matched=bKeys.filter(k=>selQIds.includes(k));

  const selML=selMonthLabels();
  const mRows=BANK_MONTHLY.filter(bm=>selML.has(bm.m)).map(bm=>{
    const em=MONTHLY.find(x=>x.m===bm.m);
    return{m:bm.m,exp:em?em.v:0,income:bm.income,expense:bm.expense,net:bm.net,bal:bm.bal};
  });

  if(!matched.length&&!mRows.length) return `<div class="box"><p style="color:var(--text3)">Bank data available for Nov 2024\u2013Sep 2025. Select matching quarters to compare.</p></div>`;

  let totalExp=0,totalBankI=0,totalBankE=0,totalBankN=0;
  const qRows=matched.map(k=>{
    const b=BANK_QUARTERLY[k];
    const q=qs.find(x=>x.id===k);
    const exp=q?q.total:0;
    totalExp+=exp;totalBankI+=b.income;totalBankE+=b.expense;totalBankN+=b.net;
    return{k,b,exp};
  });

  let mTotExp=0,mTotI=0,mTotE=0,mTotN=0;
  mRows.forEach(r=>{mTotExp+=r.exp;mTotI+=r.income;mTotE+=r.expense;mTotN+=r.net;});

  let h=`<div class="stats" style="margin-bottom:16px"><div class="stat stat-accent" style="border-color:var(--amber)"><div class="stat-v" style="color:var(--amber)">${fmt(mTotExp||totalExp)}</div><div class="stat-l">Committee Expenditure</div></div>`;
  h+=`<div class="stat stat-accent" style="border-color:var(--green)"><div class="stat-v up">${fmt(mTotI||totalBankI)}</div><div class="stat-l">Bank Income</div></div>`;
  h+=`<div class="stat stat-accent" style="border-color:var(--red)"><div class="stat-v dn">${fmt(mTotE||totalBankE)}</div><div class="stat-l">Bank Outflow</div></div>`;
  h+=`<div class="stat stat-accent" style="border-color:var(--teal)"><div class="stat-v tl">${fmt(mTotN||totalBankN)}</div><div class="stat-l">Bank Net</div></div></div>`;

  // ── Monthly Comparison ──
  if(mRows.length){
    const maxM=Math.max(...mRows.map(r=>Math.max(r.income,r.expense,r.exp)));
    const barH=150;

    h+=`<div class="box"><div class="box-title">Monthly: Committee Expenditure vs Bank Income &amp; Outflow</div>`;
    h+=`<div class="chart-legend"><span><span class="ldot" style="background:var(--amber)"></span>Committee Exp.</span><span><span class="ldot" style="background:var(--green)"></span>Bank Income</span><span><span class="ldot" style="background:var(--red)"></span>Bank Outflow</span></div>`;
    h+=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div class="bar-chart-wrap"><div class="bar-row" style="grid-template-columns:repeat(${mRows.length},1fr);min-width:${mRows.length*100}px">`;
    mRows.forEach(r=>{
      const hC=Math.max(4,(r.exp/maxM)*barH);
      const hI=Math.max(4,(r.income/maxM)*barH);
      const hE=Math.max(4,(r.expense/maxM)*barH);
      h+=`<div class="bar-col"><div class="bar-area" style="gap:3px">`;
      h+=`<div class="bar-stick" style="height:${hC}px;background:var(--amber);width:22px" onmouseover="showTip(event,'${r.m} Committee: ${fmtFull(r.exp)}')" onmouseout="hideTip()"><span class="bv" style="color:var(--amber);font-size:8px">${fmtL(r.exp)}</span></div>`;
      h+=`<div class="bar-stick" style="height:${hI}px;background:var(--green);width:22px" onmouseover="showTip(event,'${r.m} Income: ${fmtFull(r.income)}')" onmouseout="hideTip()"><span class="bv" style="color:var(--green);font-size:8px">${fmtL(r.income)}</span></div>`;
      h+=`<div class="bar-stick" style="height:${hE}px;background:var(--red);width:22px" onmouseover="showTip(event,'${r.m} Outflow: ${fmtFull(r.expense)}')" onmouseout="hideTip()"><span class="bv" style="color:var(--red);font-size:8px">${fmtL(r.expense)}</span></div>`;
      h+=`</div><div class="bar-lbl" style="font-size:9px">${r.m.split(" ")[0].substring(0,3)}</div><div class="bar-sub">${r.m.split(" ")[1]||""}</div></div>`;
    });
    h+=`</div></div></div></div>`;

    // Monthly diff line chart (SVG) — shows gap: bank outflow − committee exp per month
    const diffs=mRows.map(r=>r.expense-r.exp);
    const svgW=Math.max(400,mRows.length*70),svgH=120,padL=50,padR=20,padT=20,padB=30;
    const drawW=svgW-padL-padR, drawH=svgH-padT-padB;
    const allV=diffs.concat([0]);
    const minV=Math.min(...allV),maxV=Math.max(...allV);
    const range=maxV-minV||1;
    const sx=i=>padL+(i/(mRows.length-1||1))*drawW;
    const sy=v=>padT+(1-(v-minV)/range)*drawH;
    const pts=diffs.map((v,i)=>`${sx(i)},${sy(v)}`).join(" ");
    const zeroY=sy(0);
    h+=`<div class="box"><div class="box-title">Monthly Gap: Bank Outflow \u2212 Committee Expenditure</div>`;
    h+=`<p style="font-size:11px;color:var(--text3);margin:0 0 8px">Positive = bank paid more than committee recorded. Negative = committee recorded more than bank outflow.</p>`;
    h+=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><svg width="${svgW}" height="${svgH}" style="font-family:inherit">`;
    h+=`<line x1="${padL}" x2="${svgW-padR}" y1="${zeroY}" y2="${zeroY}" stroke="var(--text3)" stroke-dasharray="4,4" opacity="0.5"/>`;
    h+=`<text x="${padL-6}" y="${zeroY+3}" text-anchor="end" style="font-size:9px;fill:var(--text3)">0</text>`;
    h+=`<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>`;
    diffs.forEach((v,i)=>{
      const cx=sx(i),cy=sy(v);
      const col=v>0?'var(--red)':'var(--green)';
      h+=`<circle cx="${cx}" cy="${cy}" r="5" fill="${col}" stroke="var(--surface)" stroke-width="2" onmouseover="showTip(event,'${mRows[i].m}: ${v>0?'+':''}${fmtFull(v)}')" onmouseout="hideTip()"/>`;
      h+=`<text x="${cx}" y="${svgH-6}" text-anchor="middle" style="font-size:8px;fill:var(--text3)">${mRows[i].m.split(" ")[0].substring(0,3)}</text>`;
    });
    h+=`</svg></div></div>`;

    // Monthly table
    h+=`<div class="tw"><table><thead><tr><th>Month</th><th class="num">Committee Exp.</th><th class="num">Bank Income</th><th class="num">Bank Outflow</th><th class="num">Gap (Out\u2212Exp)</th><th class="num">Bank Net</th><th class="num">Balance</th></tr></thead><tbody>`;
    mRows.forEach(r=>{
      const gap=r.expense-r.exp;
      const gapCol=gap>0?'var(--red)':'var(--green)';
      h+=`<tr><td style="font-weight:600">${r.m}</td><td class="num" style="color:var(--amber)">${fmtFull(r.exp)}</td><td class="num" style="color:var(--green)">${fmtFull(r.income)}</td><td class="num" style="color:var(--red)">${fmtFull(r.expense)}</td><td class="num" style="color:${gapCol}">${gap>0?'+':''}${fmtFull(gap)}</td><td class="num" style="color:${r.net>0?'var(--green)':'var(--red)'}">${r.net>0?'+':''}${fmtFull(r.net)}</td><td class="num">${fmtFull(r.bal)}</td></tr>`;
    });
    const totalGap=mTotE-mTotExp;
    h+=`<tr class="tr-total"><td>Total</td><td class="num">${fmtFull(mTotExp)}</td><td class="num">${fmtFull(mTotI)}</td><td class="num">${fmtFull(mTotE)}</td><td class="num" style="color:${totalGap>0?'var(--red)':'var(--green)'}">${totalGap>0?'+':''}${fmtFull(totalGap)}</td><td class="num">${mTotN>0?'+':''}${fmtFull(mTotN)}</td><td class="num">${fmtFull(mRows[mRows.length-1].bal)}</td></tr></tbody></table></div>`;

    // Monthly insights
    const peakGap=mRows.reduce((a,b)=>(b.expense-b.exp)>(a.expense-a.exp)?b:a);
    const bestMatch=mRows.reduce((a,b)=>Math.abs(b.expense-b.exp)<Math.abs(a.expense-a.exp)?b:a);
    const avgExp=mTotExp/mRows.length, avgBankE=mTotE/mRows.length;
    h+=`<div class="insight-grid">`;
    h+=`<div class="insight a"><div class="insight-t">Biggest Mismatch</div><div class="insight-d"><strong>${peakGap.m}</strong> \u2014 Bank outflow exceeded committee records by <strong>${fmtFull(peakGap.expense-peakGap.exp)}</strong>. Likely due to vendor advances, contractor settlements, or bank charges.</div></div>`;
    h+=`<div class="insight g"><div class="insight-t">Best Alignment</div><div class="insight-d"><strong>${bestMatch.m}</strong> \u2014 Gap of only <strong>${fmtFull(Math.abs(bestMatch.expense-bestMatch.exp))}</strong> between bank outflow and committee expenditure. Accounts well reconciled.</div></div>`;
    h+=`<div class="insight b"><div class="insight-t">Average Monthly</div><div class="insight-d">Committee avg: <strong>${fmtFull(avgExp)}/mo</strong>. Bank outflow avg: <strong>${fmtFull(avgBankE)}/mo</strong>. Bank income avg: <strong>${fmtFull(mTotI/mRows.length)}/mo</strong>.</div></div>`;
    const coverage=(mTotExp/mTotE*100).toFixed(1);
    h+=`<div class="insight ${coverage>85?'g':coverage>70?'b':'a'}"><div class="insight-t">Expenditure Coverage</div><div class="insight-d">Committee records account for <strong>${coverage}%</strong> of total bank outflows. ${coverage>85?'Excellent record-keeping.':coverage>70?'Good tracking with minor gaps.':'Significant untracked bank outflows — review vendor payments.'}</div></div>`;
    h+=`</div>`;
  }

  // ── Quarterly Comparison ──
  if(qRows.length){
    const maxBar=Math.max(...qRows.map(r=>Math.max(r.b.income,r.b.expense,r.exp)));
    h+=`<div class="box" style="margin-top:24px"><div class="box-title">Quarterly Summary: Committee vs Bank</div>`;
    h+=`<div class="chart-legend"><span><span class="ldot" style="background:var(--amber)"></span>Committee Exp.</span><span><span class="ldot" style="background:var(--green)"></span>Bank Income</span><span><span class="ldot" style="background:var(--red)"></span>Bank Outflow</span></div>`;
    h+=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div class="bar-chart-wrap"><div class="bar-row" style="grid-template-columns:repeat(${qRows.length},1fr);min-width:${qRows.length*160}px">`;
    qRows.forEach(r=>{
      const hC=Math.max(4,(r.exp/maxBar)*160);
      const hI=Math.max(4,(r.b.income/maxBar)*160);
      const hE=Math.max(4,(r.b.expense/maxBar)*160);
      h+=`<div class="bar-col"><div class="bar-area" style="gap:4px"><div class="bar-stick" style="height:${hC}px;background:var(--amber);width:28px" onmouseover="showTip(event,'${r.b.label} Committee: ${fmtFull(r.exp)}')" onmouseout="hideTip()"><span class="bv" style="color:var(--amber)">${fmt(r.exp)}</span></div><div class="bar-stick" style="height:${hI}px;background:var(--green);width:28px" onmouseover="showTip(event,'${r.b.label} Bank Income: ${fmtFull(r.b.income)}')" onmouseout="hideTip()"><span class="bv" style="color:var(--green)">${fmt(r.b.income)}</span></div><div class="bar-stick" style="height:${hE}px;background:var(--red);width:28px" onmouseover="showTip(event,'${r.b.label} Bank Outflow: ${fmtFull(r.b.expense)}')" onmouseout="hideTip()"><span class="bv" style="color:var(--red)">${fmt(r.b.expense)}</span></div></div><div class="bar-lbl">${r.b.label}</div><div class="bar-sub">${r.b.period}</div></div>`;
    });
    h+=`</div></div></div></div>`;

    h+=`<div class="tw"><table><thead><tr><th>Quarter</th><th>Period</th><th class="num">Committee Exp.</th><th class="num">Bank Income</th><th class="num">Bank Outflow</th><th class="num">Bank Net</th><th class="num">Balance</th></tr></thead><tbody>`;
    qRows.forEach(r=>{
      h+=`<tr><td style="font-weight:600">${r.b.label}</td><td style="color:var(--text3)">${r.b.period}</td><td class="num" style="color:var(--amber)">${fmtFull(r.exp)}</td><td class="num" style="color:var(--green)">${fmtFull(r.b.income)}</td><td class="num" style="color:var(--red)">${fmtFull(r.b.expense)}</td><td class="num" style="color:${r.b.net>0?'var(--green)':'var(--red)'}">${fmtFull(r.b.net)}</td><td class="num">${fmtFull(r.b.closeBal)}</td></tr>`;
    });
    h+=`<tr class="tr-total"><td>Total</td><td></td><td class="num">${fmtFull(totalExp)}</td><td class="num">${fmtFull(totalBankI)}</td><td class="num">${fmtFull(totalBankE)}</td><td class="num">${fmtFull(totalBankN)}</td><td class="num">${fmtFull(qRows[qRows.length-1].b.closeBal)}</td></tr></tbody></table></div>`;
  }

  return h;
}

function renderInsights(qs,mo,ts){
  if(mo===0) return `<div class="box"><p style="color:var(--text3)">Select quarters to see insights.</p></div>`;
  const waterPct=(catTotal("water")/ts*100).toFixed(0);
  const elecFirst=qs[0].cats.electricity/qs[0].months;
  const elecLast=qs[qs.length-1].cats.electricity/qs[qs.length-1].months;
  const elecGrowth=qs.length>1?((elecLast-elecFirst)/elecFirst*100).toFixed(0):"0";

  const cats=Object.keys(CAT_META);
  const biggest=cats.reduce((a,c)=>catTotal(c)>catTotal(a)?c:a,cats[0]);
  const bigMeta=CAT_META[biggest];
  const bigPct=(catTotal(biggest)/ts*100).toFixed(0);
  const fastestGrowing=qs.length>1?cats.filter(c=>qs[0].cats[c]>0).reduce((best,c)=>{
    const g=(qs[qs.length-1].cats[c]/qs[qs.length-1].months)/(qs[0].cats[c]/qs[0].months);
    return g>best.g?{c,g}:best;
  },{c:cats[0],g:0}):null;
  const fgMeta=fastestGrowing?CAT_META[fastestGrowing.c]:null;
  const fgPct=fastestGrowing?((fastestGrowing.g-1)*100).toFixed(0):"0";

  let h=`<div class="insight-grid">
    <div class="insight r"><div class="insight-t">${bigMeta.label} is ${bigPct}% of All Spend</div><div class="insight-d">${fmt(catTotal(biggest))} over ${mo} months (${fmt(catTotal(biggest)/mo)}/month). The single largest expense category in the selected period.</div></div>
    <div class="insight g"><div class="insight-t">Stable Core Operations</div><div class="insight-d">Fogging (${fmt(catTotal("fogging")/mo)}/mo), BBMP Garbage (${fmt(catTotal("bbmp")/mo)}/mo), and Salary (${fmt(catTotal("salary")/mo)}/mo) show minimal variance — well-managed contracts.</div></div>
    <div class="insight a"><div class="insight-t">Electricity ${+elecGrowth>0?"Up":"Changed"} ${Math.abs(+elecGrowth)}% Over Period</div><div class="insight-d">BESCOM bills: ${fmt(elecFirst)}/mo → ${fmt(elecLast)}/mo. Consider LED upgrades, timer controls, or solar panels.</div></div>
    <div class="insight b"><div class="insight-t">${fgMeta?fgMeta.label+" Grew "+fgPct+"%":"Security Costs Stabilized"}</div><div class="insight-d">${fgMeta?`Monthly avg went from ${fmt(qs[0].cats[fastestGrowing.c]/qs[0].months)} to ${fmt(qs[qs.length-1].cats[fastestGrowing.c]/qs[qs.length-1].months)}. Worth monitoring.`:`${fmt(catTotal("security"))} total, ~${fmt(catTotal("security")/mo)}/month.`}</div></div>
  </div>`;
  h+=`<div class="tw" style="margin-top:16px"><table><thead><tr><th>Area</th><th>${mo}-Mo Total</th><th>Monthly Avg</th><th>Opportunity</th><th>Est. Saving</th></tr></thead><tbody>
    <tr><td><span class="cat-dot" style="background:#3b82f6"></span>Water Supply</td><td class="num">${fmt(catTotal("water"))}</td><td class="num">${fmt(catTotal("water")/mo)}</td><td>Rainwater harvesting, bore well</td><td class="num">10\u201320%</td></tr>
    <tr><td><span class="cat-dot" style="background:#f59e0b"></span>Electricity</td><td class="num">${fmt(catTotal("electricity"))}</td><td class="num">${fmt(catTotal("electricity")/mo)}</td><td>LED, timers, solar panels</td><td class="num">5\u201315%</td></tr>
    <tr><td><span class="cat-dot" style="background:#dc2626"></span>Generator</td><td class="num">${fmt(catTotal("generator"))}</td><td class="num">${fmt(catTotal("generator")/mo)}</td><td>Single diesel vendor, bulk rate</td><td class="num">10\u201315%</td></tr>
    <tr><td><span class="cat-dot" style="background:#ef4444"></span>Plumbing</td><td class="num">${fmt(catTotal("plumbing"))}</td><td class="num">${fmt(catTotal("plumbing")/mo)}</td><td>Preventive maintenance program</td><td class="num">15\u201325%</td></tr>
  </tbody></table></div>`;
  const annual=ts/mo*12;
  h+=`<div class="stats stats-3" style="margin-top:16px">
    <div class="stat" style="border-top:3px solid var(--accent)"><div class="stat-v">${fmt(annual)}</div><div class="stat-l">Projected Annual</div></div>
    <div class="stat" style="border-top:3px solid var(--green)"><div class="stat-v n">${fmt(ts/mo)}</div><div class="stat-l">Monthly Average</div></div>
    <div class="stat" style="border-top:3px solid var(--amber)"><div class="stat-v" style="color:var(--amber)">${fmt(catTotal("water")/mo*12)}</div><div class="stat-l">Water Alone (Annual)</div></div>
  </div>`;
  return h;
}

function renderSidebar(){
  el("sidebarNav").innerHTML=SECTIONS.map(s=>`<a class="nav-link" href="#sec-${s.id}" data-sec="${s.id}"><span class="icon">${s.icon}</span><span>${s.label}</span></a>`).join("");
  const mobNav=el("mobileNavInner");
  if(mobNav) mobNav.innerHTML=SECTIONS.map(s=>`<a class="mob-link" href="#sec-${s.id}" data-sec="${s.id}"><span class="mob-icon">${s.icon}</span><span>${s.label}</span></a>`).join("");
}
function initScrollSpy(){
  const links=document.querySelectorAll(".nav-link,.mob-link");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const secId=e.target.id.replace("sec-","");
        links.forEach(l=>l.classList.toggle("active",l.dataset.sec===secId));
        const activeM=document.querySelector(".mob-link.active");
        if(activeM) activeM.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
      }
    });
  },{rootMargin:"-20% 0px -70% 0px"});
  SECTIONS.forEach(s=>{const sec=el("sec-"+s.id);if(sec)observer.observe(sec);});
}

// ═══════════════════════════════════════════════════════════
//  FILTER BAR
// ═══════════════════════════════════════════════════════════
function renderFilterBar(){
  let h=`<span class="filter-label">Quarters</span>`;
  h+=`<button class="filter-chip ${selected.size===QUARTERS.length?"on":""}" onclick="toggleAll()">All</button>`;
  QUARTERS.forEach(q=>{
    h+=`<button class="filter-chip ${selected.has(q.id)?"on":""}" onclick="toggleQ('${q.id}')">${q.label}</button>`;
  });
  el("filterBar").innerHTML=h;
}
function toggleQ(id){
  if(selected.has(id)){if(selected.size>1)selected.delete(id)}else selected.add(id);
  renderFilterBar();renderAll();initScrollSpy();
}
function toggleAll(){
  if(selected.size===QUARTERS.length){selected=new Set([QUARTERS[QUARTERS.length-1].id])}
  else{selected=new Set(QUARTERS.map(q=>q.id))}
  renderFilterBar();renderAll();initScrollSpy();
}

// ═══════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.dataset.theme==="dark";
  html.dataset.theme=isDark?"light":"dark";
  el("btnTheme").textContent=isDark?"Dark":"Light";
  const mob=el("mobTheme"); if(mob) mob.textContent=isDark?"🌙":"☀️";
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
renderSidebar();
renderFilterBar();
renderAll();
setTimeout(initScrollSpy,100);
</script>
</body>
